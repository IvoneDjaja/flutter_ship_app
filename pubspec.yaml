name: flutter_ship_app
description: "Flutter App Release Checklist (companion app for the Flutter in Production course)"
publish_to: 'none'
version: 0.3.7+44

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Drift and friends
  drift: 2.29.0
  drift_dev: 2.29.0
  path_provider: 2.1.5
  path: ^1.9.1
  sqlite3_flutter_libs: 0.5.40
  sqlite3: 2.9.4
  # Other packages
  flex_color_scheme: 8.3.1
  flutter_riverpod: 3.0.3
  riverpod_annotation: 3.0.3
  shared_preferences: 2.5.3
  auto_size_text: 3.0.0
  package_info_plus: 9.0.0
  dio: 5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  build_runner: 2.7.1
  riverpod_generator: 3.0.3
  custom_lint: 0.8.0
  riverpod_lint: 3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/common/